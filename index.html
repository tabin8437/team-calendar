<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>팀 캘린더</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8fafc;min-height:100vh;font-family:-apple-system,'Pretendard',sans-serif;-webkit-tap-highlight-color:transparent}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#fff}
.login-screen h1{font-size:22px;margin-bottom:4px;color:#1e293b}
.login-screen p{font-size:12px;color:#94a3b8;margin-bottom:24px}
.login-error{font-size:12px;color:#ef4444;margin-top:12px;min-height:18px}
#app{display:none;height:100vh;flex-direction:column}
#app.visible{display:flex}

.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;flex-wrap:wrap;gap:8px}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar h1{font-size:16px;font-weight:700;color:#1e293b}
.topbar .user-name{font-size:11px;color:#94a3b8;background:#f1f5f9;padding:3px 10px;border-radius:20px}
.topbar .user-mascot{font-size:14px}
.month-nav{display:flex;align-items:center;gap:8px}
.nav-btn{background:none;border:1px solid #e2e8f0;border-radius:8px;width:32px;height:32px;font-size:14px;cursor:pointer;color:#64748b;display:flex;align-items:center;justify-content:center}
.nav-btn:active{background:#f1f5f9}
.btn-today{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer}
.btn-admin{background:none;border:1px solid #e2e8f0;border-radius:8px;width:32px;height:32px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.cal-container{display:flex;gap:4px;padding:8px;overflow-x:auto;flex:1}
.cal-month{flex:1;min-width:340px;display:flex;flex-direction:column}
.cal-month-title{text-align:center;font-size:14px;font-weight:700;color:#1e293b;padding:8px 0}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:10px;font-weight:700;color:#94a3b8;padding:4px 0}
.cal-header .sun{color:#ef4444}
.cal-header .sat{color:#3b82f6}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;flex:1}
.cal-cell{min-height:70px;background:#fff;border-radius:6px;padding:3px;cursor:pointer;border:1px solid transparent;transition:border-color .15s}
.cal-cell:active{border-color:#6366f1}
.cal-cell.today{background:#eef2ff;border-color:#6366f1}
.cal-cell.other-month{opacity:.3}
.cal-cell.in-range{background:#ede9fe}
.cal-day{font-size:11px;font-weight:700;padding:1px 3px;color:#334155}
.cal-cell.sun .cal-day{color:#ef4444}
.cal-cell.sat .cal-day{color:#3b82f6}
.cal-events{display:flex;flex-direction:column;gap:1px;margin-top:1px}
.cal-event{font-size:8px;padding:1px 3px;border-radius:3px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;line-height:1.4}
.cal-more{font-size:8px;color:#6366f1;padding:1px 3px;font-weight:600;cursor:pointer}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:380px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h2{font-size:16px;margin-bottom:16px;color:#1e293b}
.modal label{font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:4px;margin-top:12px}
.modal input,.modal select,.modal textarea{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit}
.modal input:focus,.modal textarea:focus{outline:none;border-color:#6366f1}
.modal textarea{height:60px;resize:none}
.date-row{display:flex;gap:8px;align-items:center}
.date-row input{flex:1}
.date-row span{color:#94a3b8;font-size:13px;flex-shrink:0}
.modal .btns{display:flex;gap:8px;margin-top:16px}
.modal .btns button{flex:1;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.modal .btn-save{background:#6366f1;color:#fff}
.modal .btn-cancel{background:#f1f5f9;color:#64748b}
.modal .btn-delete{background:#fef2f2;color:#ef4444}
.modal .btns button:active{opacity:.8}
.user-mascot-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;margin-top:8px}

.day-detail{background:#fff;border-radius:16px;padding:20px;width:380px;max-width:92vw;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.day-detail h2{font-size:16px;margin-bottom:12px;color:#1e293b;display:flex;justify-content:space-between;align-items:center}
.day-detail .add-btn-sm{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
.day-event{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer}
.day-event:active{background:#f8fafc}
.day-event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.day-event-info{flex:1;min-width:0}
.day-event-title{font-size:14px;font-weight:600;color:#1e293b}
.day-event-meta{font-size:11px;color:#94a3b8;margin-top:1px}
.day-event-none{text-align:center;padding:20px;color:#94a3b8;font-size:13px}

/* Admin panel */
.admin-panel{background:#fff;border-radius:16px;padding:24px;width:460px;max-width:92vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.admin-panel h2{font-size:16px;margin-bottom:16px;color:#1e293b}
.admin-member{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;border:1px solid #e2e8f0;margin-bottom:8px}
.admin-member .mascot-icon{font-size:24px}
.admin-member .member-info{flex:1;min-width:0}
.admin-member .member-name{font-size:14px;font-weight:600;color:#1e293b}
.admin-member .member-email{font-size:11px;color:#94a3b8}
.admin-member select{padding:4px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px}
.admin-member .btn-remove{background:#fef2f2;color:#ef4444;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer}
.admin-no-members{text-align:center;padding:20px;color:#94a3b8;font-size:13px}

@media(max-width:700px){
  .cal-container{flex-direction:column}
  .cal-month{min-width:auto}
  .cal-cell{min-height:56px}
}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <h1>팀 캘린더</h1>
  <p>Google 계정으로 로그인</p>
  <div id="g_id_onload" data-client_id="272234568921-8m6a55tgvo7e86nsk2u7tjbarqff34en.apps.googleusercontent.com" data-callback="onLogin" data-auto_prompt="false" data-use_fedcm_for_prompt="false"></div>
  <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with" data-shape="rectangular" data-logo_alignment="left"></div>
  <div class="login-error" id="login-error"></div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <h1>팀 캘린더</h1>
      <span class="user-mascot" id="user-mascot"></span>
      <span class="user-name" id="user-name"></span>
    </div>
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <button class="btn-today" onclick="goToday()">오늘</button>
      <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
      <button class="btn-admin" id="btn-admin" style="display:none" onclick="openAdmin()">&#9881;</button>
    </div>
  </div>
  <div class="cal-container" id="cal-container"></div>
</div>

<div class="modal-overlay" id="day-overlay" onclick="if(event.target===this)closeDayDetail()">
  <div class="day-detail">
    <h2><span id="day-title"></span><button class="add-btn-sm" onclick="openAddFromDay()">+ 추가</button></h2>
    <div id="day-events"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">일정 추가</h2>
    <label>제목</label>
    <input type="text" id="ev-title" placeholder="일정 제목">
    <label>기간</label>
    <div class="date-row">
      <input type="date" id="ev-start">
      <span>~</span>
      <input type="date" id="ev-end">
    </div>
    <label>시간 (선택)</label>
    <input type="time" id="ev-time">
    <label>메모</label>
    <textarea id="ev-memo" placeholder="메모 (선택)"></textarea>
    <div id="mascot-badge-area"></div>
    <div class="btns" id="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="admin-overlay" onclick="if(event.target===this)closeAdmin()">
  <div class="admin-panel">
    <h2>멤버 관리</h2>
    <div id="admin-members"></div>
    <div class="btns" style="margin-top:12px">
      <button class="btn-cancel" onclick="closeAdmin()">닫기</button>
    </div>
  </div>
</div>

<script>
var API_URL='https://script.google.com/macros/s/AKfycbwj3k6xaBQKUXiZLesgBE9IxzM-5eG3bDvYNr8BybKn9l0KnMV9CqMeitrkE6U7uPbzNA/exec';
var ADMIN_EMAIL='tabin8437@gmail.com';
var MASCOTS=[
  {mascot:'rabbit',emoji:'🐰',color:'#f472b6'},
  {mascot:'cat',emoji:'🐱',color:'#a855f7'},
  {mascot:'bear',emoji:'🐻',color:'#f59e0b'},
  {mascot:'fox',emoji:'🦊',color:'#f97316'},
  {mascot:'dog',emoji:'🐶',color:'#3b82f6'}
];
var currentUser=null,currentYear,currentMonth,events=[],editingId=null,selectedDate='';
var members=[],myMember=null;

function decodeJwt(t){try{var b=t.split('.')[1];return JSON.parse(atob(b.replace(/-/g,'+').replace(/_/g,'/')));}catch(e){return null;}}
function onLogin(r){var p=decodeJwt(r.credential);if(!p||!p.email)return;currentUser={email:p.email.toLowerCase(),name:p.name||p.email};sessionStorage.setItem('cal_user',JSON.stringify(currentUser));startApp();}

function startApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-name').textContent=currentUser.name;
  if(isAdmin()) document.getElementById('btn-admin').style.display='flex';
  var n=new Date();currentYear=n.getFullYear();currentMonth=n.getMonth();
  loadMembers(function(){loadEvents();});
}
(function(){try{var u=JSON.parse(sessionStorage.getItem('cal_user'));if(u&&u.email){currentUser=u;startApp();}}catch(e){}})();

function isAdmin(){return currentUser&&currentUser.email===ADMIN_EMAIL;}

function b64(s){try{return btoa(unescape(encodeURIComponent(s||'')));}catch(e){return btoa(s||'');}}
function apiCall(params,cb){fetch(API_URL+'?'+params+'&t='+Date.now()).then(function(r){return r.json();}).then(function(d){if(cb)cb(d);}).catch(function(e){console.error(e);});}

function loadMembers(cb){
  apiCall('action=member_list',function(d){
    if(d.ok) members=d.members||[];
    myMember=members.find(function(m){return m.email===currentUser.email;});
    if(!myMember){
      // Auto-assign mascot
      var used=members.map(function(m){return m.mascot;});
      var avail=MASCOTS.filter(function(mc){return used.indexOf(mc.mascot)<0;});
      var pick=avail.length?avail[0]:MASCOTS[members.length%MASCOTS.length];
      myMember={email:currentUser.email,name:currentUser.name,mascot:pick.mascot,color:pick.color};
      saveMember(myMember,function(){members.push(myMember);updateMascotUI();if(cb)cb();});
      return;
    }
    updateMascotUI();
    if(cb)cb();
  });
}

function updateMascotUI(){
  if(!myMember)return;
  var mc=getMascotInfo(myMember.mascot);
  document.getElementById('user-mascot').textContent=mc?mc.emoji:'';
}

function getMascotInfo(mascotName){return MASCOTS.find(function(m){return m.mascot===mascotName;})||null;}
function getMemberByEmail(email){return members.find(function(m){return m.email===email;})||null;}
function getMemberByName(name){return members.find(function(m){return m.name===name;})||null;}

function saveMember(m,cb){
  var p='action=member_save&email='+encodeURIComponent(m.email)+'&name='+encodeURIComponent(b64(m.name))+'&mascot='+encodeURIComponent(m.mascot)+'&color='+encodeURIComponent(m.color);
  apiCall(p,cb);
}

function deleteMember(email,cb){apiCall('action=member_delete&email='+encodeURIComponent(email),cb);}

function loadEvents(){apiCall('action=cal_list',function(d){if(d.ok)events=d.events||[];renderCalendar();});}

function saveEventToAPI(ev,cb){
  var p='action=cal_save&id='+encodeURIComponent(ev.id)+'&date='+encodeURIComponent(ev.date)+'&endDate='+encodeURIComponent(ev.endDate||ev.date)+'&time='+encodeURIComponent(ev.time||'')+'&title='+encodeURIComponent(b64(ev.title))+'&memo='+encodeURIComponent(b64(ev.memo||''))+'&color='+encodeURIComponent(ev.color)+'&author='+encodeURIComponent(b64(ev.author));
  apiCall(p,cb);
}
function deleteEventFromAPI(id,cb){apiCall('action=cal_delete&id='+encodeURIComponent(id),cb);}

function pad(n){return n<10?'0'+n:''+n;}
function fmtDate(y,m,d){var dt=new Date(y,m,d);return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate());}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getEventMascot(ev){
  // Try to find member by author name
  var m=getMemberByName(ev.author);
  if(m){var mc=getMascotInfo(m.mascot);return {emoji:mc?mc.emoji:'',color:m.color,member:m};}
  return {emoji:'',color:ev.color||'#6366f1',member:null};
}

function eventsForDate(ds){
  return events.filter(function(e){
    var start=e.date,end=e.endDate||e.date;
    return ds>=start&&ds<=end;
  }).sort(function(a,b){return(a.time||'').localeCompare(b.time||'');});
}

function renderMonth(year,month){
  var firstDay=new Date(year,month,1).getDay();
  var lastDate=new Date(year,month+1,0).getDate();
  var prevLast=new Date(year,month,0).getDate();
  var today=new Date(),todayStr=today.getFullYear()+'-'+pad(today.getMonth()+1)+'-'+pad(today.getDate());
  var monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  var html='<div class="cal-month"><div class="cal-month-title">'+year+'년 '+monthNames[month]+'</div>';
  html+='<div class="cal-header"><div class="sun">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="sat">토</div></div>';
  html+='<div class="cal-grid">';

  for(var i=0;i<firstDay;i++){
    var d=prevLast-firstDay+1+i,ds=fmtDate(year,month-1,d);
    html+='<div class="cal-cell other-month" onclick="openDay(\''+ds+'\')"><div class="cal-day">'+d+'</div></div>';
  }
  for(var d=1;d<=lastDate;d++){
    var ds=fmtDate(year,month,d);
    var dow=new Date(year,month,d).getDay();
    var cls='cal-cell';
    if(ds===todayStr)cls+=' today';
    if(dow===0)cls+=' sun';
    if(dow===6)cls+=' sat';
    var dayEv=eventsForDate(ds);
    var evHtml='';
    var show=Math.min(dayEv.length,2);
    for(var j=0;j<show;j++){
      var em=getEventMascot(dayEv[j]);
      var label=dayEv[j].title;
      if(dayEv[j].endDate&&dayEv[j].endDate!==dayEv[j].date){
        if(ds===dayEv[j].date)label=label+' ▸';
        else if(ds===dayEv[j].endDate)label='▸ '+label;
        else label='─ '+label;
      }
      var displayLabel=em.emoji?' '+em.emoji+' '+esc(label):esc(label);
      evHtml+='<div class="cal-event" style="background:'+em.color+'" onclick="event.stopPropagation();openDay(\''+ds+'\')">'+displayLabel+'</div>';
    }
    if(dayEv.length>2)evHtml+='<div class="cal-more">+'+(dayEv.length-2)+'</div>';
    html+='<div class="'+cls+'" onclick="openDay(\''+ds+'\')"><div class="cal-day">'+d+'</div><div class="cal-events">'+evHtml+'</div></div>';
  }
  var total=firstDay+lastDate;
  var remain=(total<=35?35:42)-total;
  for(var i=1;i<=remain;i++){
    var ds=fmtDate(year,month+1,i);
    html+='<div class="cal-cell other-month" onclick="openDay(\''+ds+'\')"><div class="cal-day">'+i+'</div></div>';
  }
  html+='</div></div>';
  return html;
}

function renderCalendar(){
  var c=document.getElementById('cal-container');
  var m2=currentMonth+1,y2=currentYear;
  if(m2>11){m2=0;y2++;}
  c.innerHTML=renderMonth(currentYear,currentMonth)+renderMonth(y2,m2);
}

function changeMonth(d){currentMonth+=d;if(currentMonth>11){currentMonth=0;currentYear++;}if(currentMonth<0){currentMonth=11;currentYear--;}renderCalendar();}
function goToday(){var n=new Date();currentYear=n.getFullYear();currentMonth=n.getMonth();renderCalendar();}

function openDay(ds){
  selectedDate=ds;
  document.getElementById('day-title').textContent=ds;
  var dayEv=eventsForDate(ds);
  var html='';
  if(!dayEv.length){html='<div class="day-event-none">일정이 없습니다</div>';}
  else{dayEv.forEach(function(ev){
    var em=getEventMascot(ev);
    var period=(ev.endDate&&ev.endDate!==ev.date)?ev.date+' ~ '+ev.endDate:'';
    var canClick=isAdmin()||(currentUser&&ev.author===currentUser.name);
    var onclick=canClick?'onclick="openEdit(\''+ev.id+'\')"':'';
    html+='<div class="day-event" '+onclick+'><div class="day-event-dot" style="background:'+em.color+'"></div><div class="day-event-info"><div class="day-event-title">'+(em.emoji?em.emoji+' ':'')+esc(ev.title)+'</div><div class="day-event-meta">'+(ev.time||'종일')+' · '+esc(ev.author)+(period?' · '+period:'')+(ev.memo?' · '+esc(ev.memo):'')+'</div></div></div>';
  });}
  document.getElementById('day-events').innerHTML=html;
  document.getElementById('day-overlay').classList.add('open');
}
function closeDayDetail(){document.getElementById('day-overlay').classList.remove('open');}

function openAddFromDay(){
  closeDayDetail();editingId=null;
  document.getElementById('modal-title').textContent='일정 추가';
  document.getElementById('ev-title').value='';
  document.getElementById('ev-start').value=selectedDate;
  document.getElementById('ev-end').value=selectedDate;
  document.getElementById('ev-time').value='';
  document.getElementById('ev-memo').value='';
  renderMascotBadge();
  document.getElementById('modal-btns').innerHTML='<button class="btn-cancel" onclick="closeModal()">취소</button><button class="btn-save" onclick="saveEvent()">저장</button>';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(function(){document.getElementById('ev-title').focus();},100);
}

function openEdit(id){
  var ev=events.find(function(e){return e.id===id;});if(!ev)return;
  var own=currentUser&&ev.author===currentUser.name;
  if(!own&&!isAdmin())return;
  closeDayDetail();editingId=id;
  document.getElementById('modal-title').textContent='일정 수정';
  document.getElementById('ev-title').value=ev.title;
  document.getElementById('ev-start').value=ev.date;
  document.getElementById('ev-end').value=ev.endDate||ev.date;
  document.getElementById('ev-time').value=ev.time||'';
  document.getElementById('ev-memo').value=ev.memo||'';
  renderMascotBadge(ev);
  var canDelete=own||isAdmin();
  document.getElementById('modal-btns').innerHTML='<button class="btn-cancel" onclick="closeModal()">취소</button>'+(canDelete?'<button class="btn-delete" onclick="deleteEvent()">삭제</button>':'')+'<button class="btn-save" onclick="saveEvent()">저장</button>';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');editingId=null;}

function renderMascotBadge(ev){
  var area=document.getElementById('mascot-badge-area');
  var m=ev?getMemberByName(ev.author):myMember;
  if(m){
    var mc=getMascotInfo(m.mascot);
    area.innerHTML='<div class="user-mascot-badge" style="background:'+m.color+'">'+(mc?mc.emoji:'')+' '+esc(m.name)+'</div>';
  } else {
    area.innerHTML='';
  }
}

function saveEvent(){
  var title=document.getElementById('ev-title').value.trim();
  if(!title){alert('제목을 입력하세요');return;}
  var start=document.getElementById('ev-start').value;
  var end=document.getElementById('ev-end').value||start;
  if(end<start)end=start;
  var time=document.getElementById('ev-time').value;
  var memo=document.getElementById('ev-memo').value.trim();
  var color=myMember?myMember.color:'#6366f1';
  var author=currentUser.name;
  // If editing someone else's event (admin), keep original author/color
  if(editingId){
    var orig=events.find(function(e){return e.id===editingId;});
    if(orig&&orig.author!==currentUser.name&&isAdmin()){
      author=orig.author;
      var om=getMemberByName(orig.author);
      if(om) color=om.color;
    }
  }
  var id=editingId||('ev_'+Date.now()+'_'+Math.random().toString(36).slice(2,6));
  var ev={id:id,date:start,endDate:end,time:time,title:title,memo:memo,color:color,author:author};
  saveEventToAPI(ev,function(d){if(d.ok){loadEvents();closeModal();}else alert('저장 실패');});
}

function deleteEvent(){
  if(!editingId||!confirm('이 일정을 삭제할까요?'))return;
  deleteEventFromAPI(editingId,function(d){if(d.ok){loadEvents();closeModal();}});
}

/* ── Admin Panel ── */
function openAdmin(){
  if(!isAdmin())return;
  loadMembers(function(){renderAdminPanel();document.getElementById('admin-overlay').classList.add('open');});
}
function closeAdmin(){document.getElementById('admin-overlay').classList.remove('open');}

function renderAdminPanel(){
  var html='';
  if(!members.length){html='<div class="admin-no-members">등록된 멤버가 없습니다</div>';}
  else{
    members.forEach(function(m){
      var mc=getMascotInfo(m.mascot);
      html+='<div class="admin-member"><div class="mascot-icon">'+(mc?mc.emoji:'')+' </div><div class="member-info"><div class="member-name">'+esc(m.name)+'</div><div class="member-email">'+esc(m.email)+'</div></div>';
      html+='<select onchange="changeMascot(\''+esc(m.email)+'\',this.value)">';
      MASCOTS.forEach(function(opt){html+='<option value="'+opt.mascot+'"'+(opt.mascot===m.mascot?' selected':'')+'>'+opt.emoji+' '+opt.mascot+'</option>';});
      html+='</select>';
      html+='<button class="btn-remove" onclick="removeMember(\''+esc(m.email)+'\')">삭제</button>';
      html+='</div>';
    });
  }
  document.getElementById('admin-members').innerHTML=html;
}

function changeMascot(email,mascotName){
  var m=getMemberByEmail(email);if(!m)return;
  var mc=getMascotInfo(mascotName);if(!mc)return;
  m.mascot=mascotName;
  m.color=mc.color;
  saveMember(m,function(){loadMembers(function(){renderAdminPanel();renderCalendar();});});
}

function removeMember(email){
  if(!confirm(email+' 멤버를 삭제할까요?'))return;
  deleteMember(email,function(){loadMembers(function(){renderAdminPanel();renderCalendar();});});
}
</script>
