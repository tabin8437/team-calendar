<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>팀 캘린더</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8fafc;min-height:100vh;font-family:-apple-system,'Pretendard',sans-serif;-webkit-tap-highlight-color:transparent}

/* ── login ── */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#fff}
.login-screen h1{font-size:22px;margin-bottom:4px;color:#1e293b}
.login-screen p{font-size:12px;color:#94a3b8;margin-bottom:24px}
.login-error{font-size:12px;color:#ef4444;margin-top:12px;min-height:18px}
#app{display:none}

/* ── topbar ── */
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar h1{font-size:16px;font-weight:700;color:#1e293b}
.topbar .user-name{font-size:11px;color:#94a3b8;background:#f1f5f9;padding:3px 10px;border-radius:20px}
.month-nav{display:flex;align-items:center;gap:12px}
.month-nav button{background:none;border:1px solid #e2e8f0;border-radius:8px;width:32px;height:32px;font-size:14px;cursor:pointer;color:#64748b;display:flex;align-items:center;justify-content:center}
.month-nav button:active{background:#f1f5f9}
.month-label{font-size:15px;font-weight:700;color:#1e293b;min-width:120px;text-align:center}
.btn-today{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer}
.btn-today:active{opacity:.8}

/* ── calendar ── */
.cal-wrap{padding:8px}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;font-weight:700;color:#94a3b8;padding:8px 0}
.cal-header .sun{color:#ef4444}
.cal-header .sat{color:#3b82f6}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{min-height:80px;background:#fff;border-radius:8px;padding:4px;cursor:pointer;border:1px solid transparent;transition:border-color .15s}
.cal-cell:active{border-color:#6366f1}
.cal-cell.today{background:#eef2ff;border-color:#6366f1}
.cal-cell.other-month{opacity:.35}
.cal-day{font-size:12px;font-weight:700;padding:2px 4px;color:#334155}
.cal-cell.sun .cal-day{color:#ef4444}
.cal-cell.sat .cal-day{color:#3b82f6}
.cal-events{display:flex;flex-direction:column;gap:1px;margin-top:2px}
.cal-event{font-size:9px;padding:2px 4px;border-radius:4px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:600}
.cal-event:active{opacity:.7}
.cal-more{font-size:9px;color:#6366f1;padding:2px 4px;font-weight:600;cursor:pointer}

/* ── event colors ── */
.ev-indigo{background:#6366f1}.ev-rose{background:#f43f5e}.ev-emerald{background:#10b981}
.ev-amber{background:#f59e0b}.ev-sky{background:#0ea5e9}.ev-purple{background:#a855f7}
.ev-orange{background:#f97316}.ev-teal{background:#14b8a6}

/* ── modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:360px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h2{font-size:16px;margin-bottom:16px;color:#1e293b}
.modal label{font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:4px;margin-top:12px}
.modal input,.modal select,.modal textarea{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;transition:border-color .2s}
.modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:#6366f1}
.modal textarea{height:60px;resize:none}
.modal .btns{display:flex;gap:8px;margin-top:16px}
.modal .btns button{flex:1;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.modal .btn-save{background:#6366f1;color:#fff}
.modal .btn-cancel{background:#f1f5f9;color:#64748b}
.modal .btn-delete{background:#fef2f2;color:#ef4444}
.modal .btns button:active{opacity:.8}
.color-picker{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border-color .15s}
.color-dot.active{border-color:#1e293b}

/* ── day detail ── */
.day-detail{background:#fff;border-radius:16px;padding:20px;width:360px;max-width:92vw;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.day-detail h2{font-size:16px;margin-bottom:12px;color:#1e293b;display:flex;justify-content:space-between;align-items:center}
.day-detail .add-btn-sm{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
.day-event{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;transition:background .15s}
.day-event:active{background:#f8fafc}
.day-event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.day-event-info{flex:1;min-width:0}
.day-event-title{font-size:14px;font-weight:600;color:#1e293b}
.day-event-meta{font-size:11px;color:#94a3b8;margin-top:1px}
.day-event-none{text-align:center;padding:20px;color:#94a3b8;font-size:13px}

/* ── mobile ── */
@media(max-width:640px){
  .cal-cell{min-height:60px}
  .cal-day{font-size:11px}
  .cal-event{font-size:8px}
  .topbar{padding:10px 12px}
  .month-label{font-size:14px;min-width:100px}
}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <h1>팀 캘린더</h1>
  <p>Google 계정으로 로그인</p>
  <div id="g_id_onload"
    data-client_id="272234568921-8m6a55tgvo7e86nsk2u7tjbarqff34en.apps.googleusercontent.com"
    data-callback="onLogin" data-auto_prompt="false" data-use_fedcm_for_prompt="false"></div>
  <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with" data-shape="rectangular" data-logo_alignment="left"></div>
  <div class="login-error" id="login-error"></div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <h1>팀 캘린더</h1>
      <span class="user-name" id="user-name"></span>
    </div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="month-label"></span>
      <button onclick="changeMonth(1)">›</button>
      <button class="btn-today" onclick="goToday()">오늘</button>
    </div>
  </div>
  <div class="cal-wrap">
    <div class="cal-header">
      <div class="sun">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="sat">토</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</div>

<!-- Day Detail -->
<div class="modal-overlay" id="day-overlay" onclick="if(event.target===this)closeDayDetail()">
  <div class="day-detail">
    <h2><span id="day-title"></span><button class="add-btn-sm" onclick="openAddFromDay()">+ 추가</button></h2>
    <div id="day-events"></div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">일정 추가</h2>
    <label>제목</label>
    <input type="text" id="ev-title" placeholder="일정 제목">
    <label>날짜</label>
    <input type="date" id="ev-date">
    <label>시간 (선택)</label>
    <input type="time" id="ev-time">
    <label>메모</label>
    <textarea id="ev-memo" placeholder="메모 (선택)"></textarea>
    <label>색상</label>
    <div class="color-picker" id="color-picker"></div>
    <div class="btns" id="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<script>
var API_URL='https://script.google.com/macros/s/AKfycbwj3k6xaBQKUXiZLesgBE9IxzM-5eG3bDvYNr8BybKn9l0KnMV9CqMeitrkE6U7uPbzNA/exec';
var EV_COLORS=['indigo','rose','emerald','amber','sky','purple','orange','teal'];
var currentUser=null;
var currentYear,currentMonth;
var events=[];
var editingId=null;
var selectedDate='';

/* ── Auth ── */
function decodeJwt(t){try{var b=t.split('.')[1];return JSON.parse(atob(b.replace(/-/g,'+').replace(/_/g,'/')));}catch(e){return null;}}
function onLogin(response){
  var p=decodeJwt(response.credential);
  if(!p||!p.email){document.getElementById('login-error').textContent='인증 실패';return;}
  currentUser={email:p.email.toLowerCase(),name:p.name||p.email};
  sessionStorage.setItem('cal_user',JSON.stringify(currentUser));
  startApp();
}
function startApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-name').textContent=currentUser.name;
  var now=new Date();currentYear=now.getFullYear();currentMonth=now.getMonth();
  loadEvents();
}
(function(){try{var u=JSON.parse(sessionStorage.getItem('cal_user'));if(u&&u.email){currentUser=u;startApp();}}catch(e){}})();

/* ── API ── */
function apiCall(params,callback){
  fetch(API_URL+'?'+params+'&t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(d){if(callback)callback(d);})
    .catch(function(e){console.error('API error',e);});
}

function loadEvents(){
  apiCall('action=cal_list',function(d){
    if(d.ok)events=d.events||[];
    renderCalendar();
  });
}

function saveEventToAPI(ev,callback){
  var params='action=cal_save&id='+encodeURIComponent(ev.id)+'&date='+encodeURIComponent(ev.date)+'&time='+encodeURIComponent(ev.time||'')+'&title='+encodeURIComponent(btoa(unescape(encodeURIComponent(ev.title))))+'&memo='+encodeURIComponent(btoa(unescape(encodeURIComponent(ev.memo||''))))+'&color='+encodeURIComponent(ev.color)+'&author='+encodeURIComponent(btoa(unescape(encodeURIComponent(ev.author))));
  apiCall(params,callback);
}

function deleteEventFromAPI(id,callback){
  apiCall('action=cal_delete&id='+encodeURIComponent(id),callback);
}

/* ── Calendar Render ── */
function renderCalendar(){
  document.getElementById('month-label').textContent=currentYear+'년 '+(currentMonth+1)+'월';
  var grid=document.getElementById('cal-grid');
  var firstDay=new Date(currentYear,currentMonth,1).getDay();
  var lastDate=new Date(currentYear,currentMonth+1,0).getDate();
  var prevLastDate=new Date(currentYear,currentMonth,0).getDate();
  var today=new Date();var todayStr=today.getFullYear()+'-'+pad(today.getMonth()+1)+'-'+pad(today.getDate());
  var cells='';

  for(var i=0;i<firstDay;i++){
    var d=prevLastDate-firstDay+1+i;
    var ds=formatDate(currentYear,currentMonth-1,d);
    cells+='<div class="cal-cell other-month" onclick="openDay(\''+ds+'\')"><div class="cal-day">'+d+'</div></div>';
  }
  for(var d=1;d<=lastDate;d++){
    var ds=formatDate(currentYear,currentMonth,d);
    var dow=new Date(currentYear,currentMonth,d).getDay();
    var cls='cal-cell';
    if(ds===todayStr)cls+=' today';
    if(dow===0)cls+=' sun';
    if(dow===6)cls+=' sat';
    var dayEvents=events.filter(function(e){return e.date===ds;}).sort(function(a,b){return(a.time||'').localeCompare(b.time||'');});
    var evHtml='';
    var show=Math.min(dayEvents.length,3);
    for(var j=0;j<show;j++){
      evHtml+='<div class="cal-event ev-'+dayEvents[j].color+'" onclick="event.stopPropagation();openDay(\''+ds+'\')">'+esc(dayEvents[j].title)+'</div>';
    }
    if(dayEvents.length>3)evHtml+='<div class="cal-more" onclick="event.stopPropagation();openDay(\''+ds+'\')">+' +(dayEvents.length-3)+'개</div>';
    cells+='<div class="'+cls+'" onclick="openDay(\''+ds+'\')"><div class="cal-day">'+d+'</div><div class="cal-events">'+evHtml+'</div></div>';
  }
  var remain=42-firstDay-lastDate;
  for(var i=1;i<=remain;i++){
    var ds=formatDate(currentYear,currentMonth+1,i);
    cells+='<div class="cal-cell other-month" onclick="openDay(\''+ds+'\')"><div class="cal-day">'+i+'</div></div>';
  }
  grid.innerHTML=cells;
}

function pad(n){return n<10?'0'+n:''+n;}
function formatDate(y,m,d){var dt=new Date(y,m,d);return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate());}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function changeMonth(delta){currentMonth+=delta;if(currentMonth>11){currentMonth=0;currentYear++;}if(currentMonth<0){currentMonth=11;currentYear--;}renderCalendar();}
function goToday(){var n=new Date();currentYear=n.getFullYear();currentMonth=n.getMonth();renderCalendar();}

/* ── Day Detail ── */
function openDay(ds){
  selectedDate=ds;
  document.getElementById('day-title').textContent=ds;
  var dayEvents=events.filter(function(e){return e.date===ds;}).sort(function(a,b){return(a.time||'').localeCompare(b.time||'');});
  var html='';
  if(!dayEvents.length){
    html='<div class="day-event-none">일정이 없습니다</div>';
  }else{
    dayEvents.forEach(function(ev){
      html+='<div class="day-event" onclick="openEdit(\''+ev.id+'\')"><div class="day-event-dot ev-'+ev.color+'"></div><div class="day-event-info"><div class="day-event-title">'+esc(ev.title)+'</div><div class="day-event-meta">'+(ev.time||'종일')+' · '+esc(ev.author)+(ev.memo?' · '+esc(ev.memo):'')+'</div></div></div>';
    });
  }
  document.getElementById('day-events').innerHTML=html;
  document.getElementById('day-overlay').classList.add('open');
}
function closeDayDetail(){document.getElementById('day-overlay').classList.remove('open');}

/* ── Add/Edit Modal ── */
function openAddFromDay(){
  closeDayDetail();
  editingId=null;
  document.getElementById('modal-title').textContent='일정 추가';
  document.getElementById('ev-title').value='';
  document.getElementById('ev-date').value=selectedDate;
  document.getElementById('ev-time').value='';
  document.getElementById('ev-memo').value='';
  renderColorPicker('indigo');
  document.getElementById('modal-btns').innerHTML='<button class="btn-cancel" onclick="closeModal()">취소</button><button class="btn-save" onclick="saveEvent()">저장</button>';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(function(){document.getElementById('ev-title').focus();},100);
}

function openEdit(id){
  var ev=events.find(function(e){return e.id===id;});
  if(!ev)return;
  closeDayDetail();
  editingId=id;
  document.getElementById('modal-title').textContent='일정 수정';
  document.getElementById('ev-title').value=ev.title;
  document.getElementById('ev-date').value=ev.date;
  document.getElementById('ev-time').value=ev.time||'';
  document.getElementById('ev-memo').value=ev.memo||'';
  renderColorPicker(ev.color);
  var isOwner=currentUser&&ev.author===currentUser.name;
  document.getElementById('modal-btns').innerHTML='<button class="btn-cancel" onclick="closeModal()">취소</button>'+(isOwner?'<button class="btn-delete" onclick="deleteEvent()">삭제</button>':'')+'<button class="btn-save" onclick="saveEvent()">저장</button>';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');editingId=null;}

function renderColorPicker(selected){
  var html='';
  EV_COLORS.forEach(function(c){
    html+='<div class="color-dot ev-'+c+(c===selected?' active':'')+'" onclick="pickColor(this,\''+c+'\')" data-color="'+c+'"></div>';
  });
  document.getElementById('color-picker').innerHTML=html;
}
function pickColor(el,c){
  document.querySelectorAll('.color-dot').forEach(function(d){d.classList.remove('active');});
  el.classList.add('active');
}

function saveEvent(){
  var title=document.getElementById('ev-title').value.trim();
  if(!title){alert('제목을 입력하세요');return;}
  var date=document.getElementById('ev-date').value;
  var time=document.getElementById('ev-time').value;
  var memo=document.getElementById('ev-memo').value.trim();
  var colorEl=document.querySelector('.color-dot.active');
  var color=colorEl?colorEl.dataset.color:'indigo';
  var id=editingId||('ev_'+Date.now()+'_'+Math.random().toString(36).slice(2,6));
  var ev={id:id,date:date,time:time,title:title,memo:memo,color:color,author:currentUser.name};

  saveEventToAPI(ev,function(d){
    if(d.ok){loadEvents();closeModal();}
    else alert('저장 실패');
  });
}

function deleteEvent(){
  if(!editingId||!confirm('이 일정을 삭제할까요?'))return;
  deleteEventFromAPI(editingId,function(d){
    if(d.ok){loadEvents();closeModal();}
  });
}

</script>
</div>
</body>
</html>
