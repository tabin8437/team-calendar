<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>해외사업팀 캘린더</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%234f46e5'/><rect x='8' y='18' width='48' height='38' rx='6' fill='white'/><rect x='8' y='18' width='48' height='16' rx='6' fill='%236366f1'/><rect x='8' y='26' width='48' height='8' fill='%236366f1'/><circle cx='22' cy='14' r='4' fill='white'/><circle cx='42' cy='14' r='4' fill='white'/><rect x='16' y='42' width='8' height='8' rx='2' fill='%23e0e7ff'/><rect x='28' y='42' width='8' height='8' rx='2' fill='%234f46e5'/><rect x='40' y='42' width='8' height='8' rx='2' fill='%23e0e7ff'/></svg>">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#4f46e5">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f2f7;min-height:100vh;font-family:-apple-system,'Pretendard','Segoe UI',sans-serif;-webkit-tap-highlight-color:transparent}

/* Login */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
.login-screen h1{font-size:26px;font-weight:800;margin-bottom:6px;color:#fff;letter-spacing:-.5px}
.login-screen p{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:28px}
.login-error{font-size:12px;color:#fca5a5;margin-top:12px;min-height:18px}

/* App */
#app{display:none;height:100vh;flex-direction:column;overflow:hidden}
#app.visible{display:flex}

/* Topbar */
.topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar h1{font-size:16px;font-weight:800;color:#111827;letter-spacing:-.4px;white-space:nowrap}
.topbar .user-badge{font-size:11px;color:#64748b;background:#f1f5f9;padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:4px}
.member-legend{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.member-chip{font-size:11px;padding:3px 10px;border-radius:20px;color:#fff;font-weight:700;display:flex;align-items:center;gap:3px;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.member-chip.me{outline:2px solid #111827;outline-offset:1px}
.topbar-right{display:flex;align-items:center;gap:6px}
.nav-btn{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;width:32px;height:32px;font-size:13px;cursor:pointer;color:#6b7280;display:flex;align-items:center;justify-content:center;transition:all .12s}
.nav-btn:hover{background:#f3f4f6;border-color:#d1d5db}
.btn-today{background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.2px;transition:background .12s}
.btn-today:hover{background:#4338ca}
.btn-admin{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;width:32px;height:32px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.btn-admin:hover{background:#f3f4f6}

/* Calendar container */
.cal-container{display:flex;gap:14px;padding:14px 18px 14px;flex:1;overflow:hidden}
.cal-month{flex:1;min-width:340px;display:flex;flex-direction:column;overflow:hidden;background:#fff;border-radius:14px;border:1px solid #e5e7eb;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.cal-month-title{text-align:center;font-size:15px;font-weight:800;color:#111827;padding:12px 0 10px;flex-shrink:0;border-bottom:1px solid #f3f4f6;letter-spacing:-.3px}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:10px;font-weight:700;color:#9ca3af;padding:7px 0;flex-shrink:0;background:#fafafa;border-bottom:1px solid #f3f4f6;letter-spacing:.5px}
.cal-header .sun{color:#f87171}
.cal-header .sat{color:#60a5fa}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;gap:0;flex:1;border-top:1px solid #f3f4f6}
.cal-cell{background:#fff;padding:3px 3px 2px;cursor:pointer;position:relative;overflow:hidden;min-height:0;display:flex;flex-direction:column;border-right:1px solid #f3f4f6;border-bottom:1px solid #f3f4f6;transition:background .1s}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:#fafbff}
.cal-cell.today{background:#eff6ff}
.cal-cell.today .cal-day-num{background:#4f46e5;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px}
.cal-cell.other-month{background:#fafafa}
.cal-cell.other-month .cal-day{color:#d1d5db}
.cal-cell.other-month .cal-day-num{color:#d1d5db;font-weight:400}
.cal-cell.other-month .ev-bar{display:none}
.cal-cell.other-month .ev-placeholder{display:none}
.cal-cell.other-month .hol-name{display:none}
.cal-cell.other-month .nol-name{display:none}
.cal-cell.other-month.holiday{background:#fafafa}
.cal-day{font-size:11px;font-weight:700;padding:1px 2px;color:#374151;flex-shrink:0;display:flex;align-items:center;gap:3px;line-height:1}
.cal-day-num{font-size:11px;font-weight:700;min-width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.cal-cell.sun .cal-day,.cal-cell.sun .cal-day-num{color:#ef4444}
.cal-cell.sat .cal-day,.cal-cell.sat .cal-day-num{color:#3b82f6}
.cal-cell.holiday{background:#fff8f8}
.cal-cell.holiday .cal-day-num{color:#ef4444}
.hol-name{font-size:8px;color:#f87171;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 24px)}
.cal-cell.nolgeum{background:#f0fdf4}
.cal-cell.nolgeum .cal-day-num{color:#16a34a}
.nol-name{font-size:8px;color:#16a34a;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 24px)}
.cal-events{flex:1;display:flex;flex-direction:column;gap:1px;min-height:0;overflow:hidden;margin-top:1px}

/* Event bars */
.ev-bar{font-size:10px;padding:2px 6px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700;line-height:1.4;height:20px;flex-shrink:0;display:flex;align-items:center;gap:3px;opacity:.95}
.ev-bar .ev-badge{display:inline-flex;align-items:center;gap:1px;background:rgba(255,255,255,.28);padding:0 4px;border-radius:8px;font-size:10px;height:16px;flex-shrink:0}
.ev-bar.start{border-radius:4px 0 0 4px;margin-left:2px}
.ev-bar.end{border-radius:0 4px 4px 0;margin-right:2px}
.ev-bar.single{border-radius:4px;margin:0 2px}
.ev-bar.mid{border-radius:0}
.ev-bar.start.end{border-radius:4px;margin:0 2px}
.ev-placeholder{height:20px;flex-shrink:0}

/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:18px;padding:26px;width:400px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.18)}
.modal h2{font-size:17px;font-weight:800;margin-bottom:16px;color:#111827}
.modal label{font-size:12px;font-weight:600;color:#6b7280;display:block;margin-bottom:4px;margin-top:14px}
.modal input,.modal select,.modal textarea{width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:inherit;transition:border-color .12s}
.modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:#4f46e5}
.modal textarea{height:64px;resize:none}
.date-row{display:flex;gap:8px;align-items:center}
.date-row input{flex:1}
.date-row span{color:#9ca3af;font-size:13px;flex-shrink:0}
.modal .btns{display:flex;gap:8px;margin-top:20px}
.modal .btns button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .12s}
.modal .btn-save{background:#4f46e5;color:#fff}
.modal .btn-save:hover{background:#4338ca}
.modal .btn-cancel{background:#f3f4f6;color:#6b7280}
.modal .btn-delete{background:#fef2f2;color:#ef4444}
.modal .btns button:active{opacity:.8}
.user-mascot-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;margin-top:8px}

/* Registration modal */
.reg-mascot-grid{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.reg-mascot-btn{width:60px;height:60px;border-radius:14px;border:2px solid #e5e7eb;background:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.reg-mascot-btn:hover:not(:disabled){transform:scale(1.08);border-color:#c7d2fe}
.reg-mascot-btn.selected{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.2);background:#eff0fe}
.reg-mascot-btn:disabled{opacity:.3;cursor:not-allowed}

/* Day detail */
.day-detail{background:#fff;border-radius:18px;padding:22px;width:400px;max-width:92vw;max-height:80vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.18)}
.day-detail h2{font-size:16px;font-weight:800;margin-bottom:14px;color:#111827;display:flex;justify-content:space-between;align-items:center}
.day-detail .add-btn-sm{background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer}
.day-event{display:flex;align-items:flex-start;gap:10px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:background .1s}
.day-event:hover{background:#f8fafc}
.day-event:active{background:#f1f5f9}
.day-event-mascot{font-size:22px;flex-shrink:0;margin-top:1px}
.day-event-info{flex:1;min-width:0}
.day-event-title{font-size:14px;font-weight:700;color:#111827}
.day-event-meta{font-size:11px;color:#9ca3af;margin-top:2px}
.day-event-memo{font-size:12px;color:#6b7280;margin-top:3px;white-space:pre-wrap}
.day-event-none{text-align:center;padding:28px;color:#9ca3af;font-size:13px}

/* Admin panel */
.admin-panel{background:#fff;border-radius:18px;padding:24px;width:500px;max-width:92vw;max-height:85vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.18)}
.admin-panel h2{font-size:17px;font-weight:800;margin-bottom:16px;color:#111827}
.admin-member{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:1px solid #e5e7eb;margin-bottom:8px;background:#fafafa}
.admin-member .mascot-icon{font-size:24px}
.admin-member .member-info{flex:1;min-width:0}
.admin-member .member-name{font-size:14px;font-weight:700;color:#111827}
.admin-member .member-email{font-size:11px;color:#9ca3af}
.admin-member select{padding:4px 8px;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;background:#fff}
.admin-member .btn-remove{background:#fef2f2;color:#ef4444;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}
.admin-member .btn-remove:hover{background:#fee2e2}

/* Loading */
.loading-spinner{display:inline-block;width:22px;height:22px;border:2.5px solid #e5e7eb;border-top-color:#4f46e5;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.75);z-index:100;display:none;align-items:center;justify-content:center}
.loading-overlay.active{display:flex}

@media(max-width:700px){
  .cal-container{flex-direction:column;overflow-y:auto;padding:10px 12px}
  .cal-month{min-width:auto;flex:none}
  .cal-cell{min-height:50px}
  .topbar{padding:0 12px}
  .topbar h1{font-size:14px}
  .ev-bar{font-size:7px;height:14px}
  .ev-placeholder{height:14px}
}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <h1>해외사업팀 캘린더</h1>
  <p>Google 계정으로 로그인하세요</p>
  <div id="g_id_onload"
    data-client_id="272234568921-8m6a55tgvo7e86nsk2u7tjbarqff34en.apps.googleusercontent.com"
    data-callback="onGoogleLogin"
    data-auto_prompt="false"
    data-use_fedcm_for_prompt="false">
  </div>
  <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="pill"></div>
  <div class="login-error" id="login-error"></div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <h1>해외사업팀 캘린더</h1>
      <span style="font-size:10px;color:#cbd5e1;font-weight:400">made by 조현영 yeriel.jo</span>
      <div class="member-legend" id="member-legend"></div>
    </div>
    <div class="topbar-right">
      <button class="nav-btn" onclick="navMonth(-1)">◀</button>
      <button class="btn-today" onclick="goToday()">오늘</button>
      <button class="nav-btn" onclick="navMonth(1)">▶</button>
      <button class="btn-admin" id="btn-admin" style="display:none" onclick="openAdmin()">⚙️</button>
    </div>
  </div>
  <div class="cal-container" id="cal-container"></div>
</div>

<!-- Registration Modal -->
<div class="modal-overlay" id="reg-overlay">
  <div class="modal">
    <h2>첫 방문 등록</h2>
    <p style="font-size:13px;color:#64748b;margin-bottom:8px">해외사업팀 캘린더에 오신 것을 환영합니다! 이름과 마스코트를 선택해주세요.</p>
    <label>이름 (닉네임)</label>
    <input type="text" id="reg-name" placeholder="예: 홍길동" maxlength="20">
    <label>마스코트 선택</label>
    <div class="reg-mascot-grid" id="reg-mascot-grid"></div>
    <div class="btns" style="margin-top:20px">
      <button class="btn-save" id="reg-submit" onclick="submitRegistration()">등록하기</button>
    </div>
  </div>
</div>

<!-- Day Detail Modal -->
<div class="modal-overlay" id="day-overlay" onclick="if(event.target===this)closeDay()">
  <div class="day-detail" id="day-detail"></div>
</div>

<!-- Event Modal -->
<div class="modal-overlay" id="event-overlay" onclick="if(event.target===this)closeEvent()">
  <div class="modal" id="event-modal"></div>
</div>

<!-- Admin Modal -->
<div class="modal-overlay" id="admin-overlay" onclick="if(event.target===this)closeAdmin()">
  <div class="admin-panel" id="admin-panel"></div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loading"><div class="loading-spinner"></div></div>

<script>
const API='https://script.google.com/macros/s/AKfycbwj3k6xaBQKUXiZLesgBE9IxzM-5eG3bDvYNr8BybKn9l0KnMV9CqMeitrkE6U7uPbzNA/exec';
const ADMIN_EMAIL='tabin8437@gmail.com';
const MASCOTS=[
  {emoji:'🐰',name:'rabbit',color:'#f472b6'},
  {emoji:'🐱',name:'cat',color:'#a855f7'},
  {emoji:'🐻',name:'bear',color:'#f59e0b'},
  {emoji:'🦊',name:'fox',color:'#f97316'},
  {emoji:'🐶',name:'dog',color:'#3b82f6'}
];

let currentUser=null; // {email,name,mascot,color}
let members=[];
let events=[];
let baseYear,baseMonth; // 0-indexed month

function enc(t){return btoa(unescape(encodeURIComponent(t)))}

async function api(action,params={}){
  const url=new URL(API);
  url.searchParams.set('action',action);
  for(const[k,v]of Object.entries(params)) url.searchParams.set(k,v);
  const r=await fetch(url.toString());
  return r.json();
}

async function apiPost(action,body={}){
  let params='action='+encodeURIComponent(action);
  for(const[k,v]of Object.entries(body)) params+='&'+encodeURIComponent(k)+'='+encodeURIComponent(v||'');
  const r=await fetch(API+'?'+params+'&t='+Date.now());
  return r.json();
}

function showLoading(){document.getElementById('loading').classList.add('active')}
function hideLoading(){document.getElementById('loading').classList.remove('active')}
function isAdmin(){return currentUser&&currentUser.email===ADMIN_EMAIL}
function getMascot(emoji){return MASCOTS.find(m=>m.emoji===emoji)||MASCOTS[0]}

// --- Google Login ---
function onGoogleLogin(response){
  const payload=JSON.parse(atob(response.credential.split('.')[1]));
  const email=payload.email;
  sessionStorage.setItem('g_email',email);
  sessionStorage.setItem('g_name',payload.name||'');
  initApp(email);
}

window.addEventListener('load',()=>{
  const email=sessionStorage.getItem('g_email');
  if(email) initApp(email);
});

const CACHE_KEY='cal_cache_v1';
function saveCache(m,e){try{localStorage.setItem(CACHE_KEY,JSON.stringify({members:m,events:e,ts:Date.now()}));}catch(ex){}}
function loadCache(){try{const c=JSON.parse(localStorage.getItem(CACHE_KEY)||'null');return c&&(Date.now()-c.ts<3600000)?c:null;}catch(e){return null;}}

async function initApp(email){
  // 캐시 있으면 즉시 표시
  const cache=loadCache();
  if(cache){
    members=cache.members||[];
    events=cache.events||[];
    const me=members.find(m=>m.email===email);
    if(me&&me.status==='approved'){
      currentUser=me;
      enterCalendarFast();
      // 백그라운드에서 최신 데이터로 갱신
      Promise.all([api('member_list'),api('cal_list')]).then(([mr,er])=>{
        members=mr.members||mr.data||[];
        events=er.events||er.data||[];
        saveCache(members,events);
        renderMemberLegend();renderCalendars();
      }).catch(()=>{});
      return;
    }
  }
  showLoading();
  try{
    const [memberRes, eventRes] = await Promise.all([api('member_list'), api('cal_list')]);
    members=memberRes.members||memberRes.data||[];
    events=eventRes.events||eventRes.data||[];
    saveCache(members,events);
    const me=members.find(m=>m.email===email);
    if(me){
      if(me.status==='pending'){
        hideLoading();
        document.getElementById('login-screen').style.display='flex';
        document.getElementById('login-error').textContent='관리자 승인 대기 중입니다.';
        document.getElementById('login-error').style.color='#f59e0b';
        return;
      }
      currentUser=me;
      enterCalendarFast();
    } else if(email===ADMIN_EMAIL){
      hideLoading();
      showRegistration(email);
    } else {
      hideLoading();
      showRegistration(email);
    }
  }catch(e){
    hideLoading();
    document.getElementById('login-error').textContent='서버 연결 실패: '+e.message;
  }
}

// --- Registration ---
function showRegistration(email){
  document.getElementById('login-screen').style.display='none';
  const overlay=document.getElementById('reg-overlay');
  overlay.classList.add('open');
  const grid=document.getElementById('reg-mascot-grid');
  const takenMascots=members.map(m=>m.mascot);
  grid.innerHTML=MASCOTS.map(m=>{
    const taken=takenMascots.includes(m.id)||takenMascots.includes(m.emoji);
    return `<button class="reg-mascot-btn${taken?' taken':''}" data-emoji="${m.emoji}" data-color="${m.color}" ${taken?'disabled':''} onclick="selectRegMascot(this)" style="${taken?'opacity:.25;cursor:not-allowed;border-color:#e2e8f0':'border-color:'+m.color+'30'}">${m.emoji}${taken?'<span style="font-size:10px;display:block">선점됨</span>':''}</button>`;
  }).join('');
  window._regEmail=email;
}

let _selectedRegMascot=null;
function selectRegMascot(btn){
  document.querySelectorAll('.reg-mascot-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  _selectedRegMascot=btn.dataset.emoji;
}

async function submitRegistration(){
  const name=document.getElementById('reg-name').value.trim();
  if(!name){alert('이름을 입력해주세요.');return}
  if(!_selectedRegMascot){alert('마스코트를 선택해주세요.');return}
  const m=getMascot(_selectedRegMascot);
  showLoading();
  try{
    const status=window._regEmail===ADMIN_EMAIL?'approved':'pending';
    await apiPost('member_save',{email:window._regEmail,name:enc(name),mascot:_selectedRegMascot,color:m.color,status:status});
    if(status==='pending'){
      document.getElementById('reg-overlay').classList.remove('open');
      document.getElementById('login-screen').style.display='flex';
      document.getElementById('login-error').textContent='가입 요청 완료! 관리자 승인 후 이용 가능합니다.';
      document.getElementById('login-error').style.color='#f59e0b';
      hideLoading();
      return;
    }
    currentUser={email:window._regEmail,name,mascot:_selectedRegMascot,color:m.color,status:'approved'};
    members.push(currentUser);

// --- Korean Holidays (공휴일 + 대체공휴일) ---
const HOLIDAYS={
  '01-01':'신정','03-01':'삼일절','05-05':'어린이날','06-06':'현충일',
  '07-17':'제헌절','08-15':'광복절','10-03':'개천절','10-09':'한글날','12-25':'성탄절'
};
const YEARLY_HOLIDAYS={
  '2025':{
    '01-28':'설날','01-29':'설날','01-30':'설날','01-27':'대체공휴일(설)',
    '05-05':'석가탄신일','05-06':'대체공휴일(어린이날)',
    '10-05':'추석','10-06':'추석','10-07':'추석','10-08':'대체공휴일(추석)'
  },
  '2026':{
    '02-16':'설날','02-17':'설날','02-18':'설날',
    '03-02':'대체공휴일(삼일절)',
    '05-24':'석가탄신일','05-25':'대체공휴일(석가탄신일)',
    '08-17':'대체공휴일(광복절)',
    '09-24':'추석','09-25':'추석','09-26':'추석','09-28':'대체공휴일(추석)',
    '10-05':'대체공휴일(개천절)'
  },
  '2027':{
    '02-06':'설날','02-07':'설날','02-08':'설날','02-09':'대체공휴일(설)',
    '05-13':'석가탄신일',
    '03-02':'대체공휴일(삼일절)',
    '05-06':'대체공휴일(어린이날)',
    '10-04':'대체공휴일(개천절)',
    '10-11':'대체공휴일(한글날)',
    '10-13':'추석','10-14':'추석','10-15':'추석'
  }
};
function isHoliday(ds){
  var md=ds.slice(5), y=ds.slice(0,4);
  if(HOLIDAYS[md])return HOLIDAYS[md];
  if(YEARLY_HOLIDAYS[y]&&YEARLY_HOLIDAYS[y][md])return YEARLY_HOLIDAYS[y][md];
  return null;
}

// --- 놀금 (격주 금요일, 2026-07-03 시작) ---
const NOLGEUM_START=new Date(2026,6,3);
function isNolgeum(ds){
  var d=new Date(ds+'T00:00:00');
  if(d.getDay()!==5)return false;
  var diff=Math.round((d-NOLGEUM_START)/(7*86400000));
  return diff>=0&&diff%2===0;
}

// --- Calendar Rendering ---
function renderCalendars(){
  const c=document.getElementById('cal-container');
  const m2=(baseMonth+1)%12;
  const y2=baseMonth===11?baseYear+1:baseYear;
  c.innerHTML=renderMonth(baseYear,baseMonth)+renderMonth(y2,m2);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function parseDate(s){const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function daysBetween(a,b){return Math.round((parseDate(b)-parseDate(a))/(86400000))}
function addDays(s,n){const d=parseDate(s);d.setDate(d.getDate()+n);return fmtDate(d.getFullYear(),d.getMonth(),d.getDate())}

function getEventsForDateRange(startDate,endDate){
  return events.filter(ev=>{
    const evStart=ev.date;
    const evEnd=ev.endDate||ev.date;
    if(evStart>endDate||evEnd<startDate) return false;
    if(_teamFilterOn) return ev.author==='team';
    return true;
  });
}

function getMemberByEmail(email){return members.find(m=>m.email===email)}

function renderMonth(year,month){
  const today=new Date();
  const todayStr=fmtDate(today.getFullYear(),today.getMonth(),today.getDate());
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const prevDays=new Date(year,month,0).getDate();
  const totalCells=42;
  const weeks=totalCells/7;

  // Build array of date strings for the grid
  const cells=[];
  for(let i=0;i<totalCells;i++){
    let d,m,y,isOther=false;
    if(i<firstDay){
      d=prevDays-firstDay+1+i;
      m=month-1;y=year;if(m<0){m=11;y--}
      isOther=true;
    } else if(i>=firstDay+daysInMonth){
      d=i-firstDay-daysInMonth+1;
      m=month+1;y=year;if(m>11){m=0;y++}
      isOther=true;
    } else {
      d=i-firstDay+1;m=month;y=year;
    }
    cells.push({date:fmtDate(y,m,d),day:d,isOther,dow:i%7});
  }

  // Compute first and last date of grid
  const gridStart=cells[0].date;
  const gridEnd=cells[cells.length-1].date;
  const relevantEvents=getEventsForDateRange(gridStart,gridEnd);

  // Sort events: multi-day first (longer first), then single-day
  const sorted=[...relevantEvents].sort((a,b)=>{
    const aLen=daysBetween(a.date,a.endDate||a.date);
    const bLen=daysBetween(b.date,b.endDate||b.date);
    if(aLen!==bLen)return bLen-aLen;
    if(a.date!==b.date)return a.date<b.date?-1:1;
    return(a.id||'').localeCompare(b.id||'');
  });

  // For each week, assign event lanes
  const weekLanes=[]; // weekIndex -> [{event, startCol, endCol}]
  for(let w=0;w<weeks;w++){
    const weekStart=cells[w*7].date;
    const weekEnd=cells[w*7+6].date;
    const lanes=[];
    for(const ev of sorted){
      const evStart=ev.date;
      const evEnd=ev.endDate||ev.date;
      if(evStart>weekEnd||evEnd<weekStart) continue;
      const cs=Math.max(0,daysBetween(weekStart,evStart));
      const ce=Math.min(6,daysBetween(weekStart,evEnd));
      const startCol=Math.max(0,cs);
      const endCol=Math.min(6,ce);
      if(startCol>6||endCol<0) continue;
      // Find lane
      let lane=-1;
      for(let l=0;l<lanes.length;l++){
        const conflict=lanes[l].some(seg=>!(endCol<seg.startCol||startCol>seg.endCol));
        if(!conflict){lane=l;break}
      }
      if(lane===-1){lane=lanes.length;lanes.push([])}
      lanes[lane].push({event:ev,startCol,endCol});
    }
    weekLanes.push(lanes);
  }

  const maxLanes=Math.max(2,...weekLanes.map(l=>l.length));

  // Build HTML
  let html=`<div class="cal-month"><div class="cal-month-title">${year}년 ${month+1}월</div>`;
  html+=`<div class="cal-header"><span class="sun">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="sat">토</span></div>`;
  html+=`<div class="cal-grid">`;

  for(let w=0;w<weeks;w++){
    const weekAllOther=cells.slice(w*7,w*7+7).every(c=>c.isOther);
    const lanes=weekLanes[w];
    for(let col=0;col<7;col++){
      const ci=w*7+col;
      const cell=cells[ci];
      if(weekAllOther){html+=`<div class="cal-cell other-month" style="opacity:0"></div>`;continue;}
      const isToday=cell.date===todayStr;
      const classes=['cal-cell'];
      if(cell.isOther) classes.push('other-month');
      if(isToday&&!cell.isOther) classes.push('today');
      const hol=isHoliday(cell.date);
      const nolgeum=!cell.isOther&&isNolgeum(cell.date);
      if(col===0||hol) classes.push('sun');
      if(col===6) classes.push('sat');
      if(hol) classes.push('holiday');
      if(nolgeum) classes.push('nolgeum');

      // Mascot dots: all events active on this day
      const dayEvents=relevantEvents.filter(ev=>{
        const s=ev.date,e=ev.endDate||ev.date;
        return s<=cell.date&&e>=cell.date;
      });
      const mascotEmojis=[...new Set(dayEvents.map(ev=>{
        const mem=getMemberByEmail(ev.author);
        return mem?mem.mascot:'';
      }).filter(Boolean))];
      const mascotsHtml=mascotEmojis.length?`<span class="mascot-dots">${mascotEmojis.join('')}</span>`:'';

      html+=`<div class="${classes.join(' ')}" onclick="openDay('${cell.date}')" data-date="${cell.date}">`;
      const holName=hol?`<span class="hol-name">${hol}</span>`:'';
      const nolName=nolgeum?`<span class="nol-name">놀금</span>`:'';
      html+=`<div class="cal-day"><span class="cal-day-num">${cell.day}</span>${holName}${nolName}</div>`;
      html+=`<div class="cal-events">`;

      // Render lane bars for this column
      for(let l=0;l<Math.min(maxLanes,4);l++){
        const seg=lanes[l]&&lanes[l].find(s=>col>=s.startCol&&col<=s.endCol);
        if(seg){
          const ev=seg.event;
          const mem=getMemberByEmail(ev.author);
          const color=mem?mem.color:(ev.color||'#6366f1');
          const mascotE=mem?mem.mascot:'';
          const isStart=col===seg.startCol;
          const isEnd=col===seg.endCol;
          const isSingle=isStart&&isEnd&&ev.date===(ev.endDate||ev.date);
          let cls='ev-bar';
          if(isSingle) cls+=' single';
          else{
            if(isStart) cls+=' start';
            if(isEnd) cls+=' end';
            if(!isStart&&!isEnd) cls+=' mid';
          }
          const memName=mem?mem.name:'';
          const label=isStart||isSingle?`<span class="ev-badge">${mascotE} ${esc(memName)}</span>${esc(ev.title||'')}`:'';
          html+=`<div class="${cls}" style="background:${color}" title="${memName}: ${ev.title||''}">${label}</div>`;
        } else {
          html+=`<div class="ev-placeholder"></div>`;
        }
      }
      html+=`</div></div>`;
    }
  }
  html+=`</div></div>`;
  return html;
}

// --- Day Detail ---
function openDay(dateStr){
  const dayEvents=events.filter(ev=>{
    const s=ev.date,e=ev.endDate||ev.date;
    return s<=dateStr&&e>=dateStr;
  });
  const d=parseDate(dateStr);
  const title=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
  const det=document.getElementById('day-detail');
  let html=`<h2>${title}<button class="add-btn-sm" onclick="openEventModal('${dateStr}')">+ 추가</button></h2>`;
  if(dayEvents.length===0){
    html+=`<div class="day-event-none">일정이 없습니다</div>`;
  } else {
    for(const ev of dayEvents){
      const mem=getMemberByEmail(ev.author);
      const mascot=mem?mem.mascot:'📅';
      const authorName=mem?mem.name:(ev.author||'');
      const canEdit=isAdmin()||(currentUser&&ev.author===currentUser.email);
      html+=`<div class="day-event" onclick="${canEdit?`openEventModal(null,'${ev.id}')`:''}">`;
      html+=`<div class="day-event-mascot">${mascot}</div>`;
      html+=`<div class="day-event-info">`;
      html+=`<div class="day-event-title">${ev.title||'(제목 없음)'}</div>`;
      html+=`<div class="day-event-meta">${ev.time?ev.time+' ・ ':''}${authorName}${ev.endDate&&ev.endDate!==ev.date?' ・ '+ev.date+' ~ '+ev.endDate:''}</div>`;
      if(ev.memo) html+=`<div class="day-event-memo">${ev.memo}</div>`;
      html+=`</div></div>`;
    }
  }
  det.innerHTML=html;
  document.getElementById('day-overlay').classList.add('open');
}
function closeDay(){document.getElementById('day-overlay').classList.remove('open')}

// --- Event Modal ---
let _editingEvent=null;
function openEventModal(dateStr,eventId){
  closeDay();
  _editingEvent=null;
  let ev={date:dateStr||fmtDate(baseYear,baseMonth,1),endDate:'',time:'',title:'',memo:''};
  if(eventId){
    const found=events.find(e=>e.id===eventId||e.id===+eventId);
    if(found){_editingEvent=found;ev=found}
  }
  const mem=currentUser;
  const mascotBadge=mem?`<div class="user-mascot-badge" style="background:${mem.color}">${mem.mascot} ${mem.name}</div>`:'';
  const canDelete=_editingEvent&&(isAdmin()||(_editingEvent.author===currentUser.email));

  const isTeamEv=_editingEvent&&_editingEvent.author==='team';
  const modal=document.getElementById('event-modal');
  modal.innerHTML=`
    <h2>${_editingEvent?'일정 수정':'일정 추가'}</h2>
    ${mascotBadge}
    <label style="margin-top:10px;display:flex;align-items:center;gap:6px;cursor:pointer">
      <input type="checkbox" id="ev-team" ${isTeamEv?'checked':''} style="width:15px;height:15px;accent-color:#6366f1;flex-shrink:0">
      <span style="font-size:12px;font-weight:700;color:#6366f1">🗓 팀일정으로 등록</span>
    </label>
    <label>제목</label>
    <input type="text" id="ev-title" value="${ev.title||''}" placeholder="일정 제목" maxlength="50">
    <label>날짜</label>
    <div class="date-row">
      <input type="date" id="ev-date" value="${ev.date||''}">
      <span>~</span>
      <input type="date" id="ev-enddate" value="${ev.endDate||ev.date||''}">
    </div>
    <label>시간 (선택)</label>
    <input type="time" id="ev-time" value="${ev.time||''}">
    <label>메모 (선택)</label>
    <textarea id="ev-memo" placeholder="메모">${ev.memo||''}</textarea>
    <div class="btns">
      <button class="btn-cancel" onclick="closeEvent()">취소</button>
      ${canDelete?'<button class="btn-delete" onclick="deleteEvent()">삭제</button>':''}
      <button class="btn-save" onclick="saveEvent()">저장</button>
    </div>`;
  document.getElementById('event-overlay').classList.add('open');
}
function closeEvent(){document.getElementById('event-overlay').classList.remove('open');_editingEvent=null}

async function saveEvent(){
  const title=document.getElementById('ev-title').value.trim();
  const date=document.getElementById('ev-date').value;
  const endDate=document.getElementById('ev-enddate').value;
  const time=document.getElementById('ev-time').value;
  const memo=document.getElementById('ev-memo').value.trim();
  if(!title){alert('제목을 입력해주세요.');return}
  if(!date){alert('날짜를 선택해주세요.');return}
  const isTeam=document.getElementById('ev-team').checked;
  const evColor=isTeam?'#6366f1':currentUser.color;
  const evAuthor=isTeam?'team':currentUser.email;
  const params={
    title:enc(title),
    date,
    endDate:endDate||date,
    time:time||'',
    memo:enc(memo),
    color:evColor,
    author:evAuthor
  };
  const id=_editingEvent?_editingEvent.id:('ev_'+Date.now()+'_'+Math.random().toString(36).slice(2,6));
  params.id=id;
  // optimistic update
  const localEv={id,date,endDate:endDate||date,time:time||'',title,memo,color:evColor,author:evAuthor};
  if(_editingEvent){events=events.filter(e=>e.id!==id);}
  events.push(localEv);
  closeEvent();
  renderCalendars();
  apiPost('cal_save',params).catch(function(e){alert('저장 실패: '+e.message);loadEvents();})
}

async function deleteEvent(){
  if(!_editingEvent)return;
  if(!confirm('이 일정을 삭제하시겠습니까?'))return;
  const delId=_editingEvent.id;
  events=events.filter(e=>e.id!==delId);
  closeEvent();
  renderCalendars();
  apiPost('cal_delete',{id:delId}).catch(function(e){alert('삭제 실패');loadEvents();})
}

  const panel=document.getElementById('admin-panel');

    html+='<div style="font-size:12px;font-weight:700;color:#f59e0b;margin-bottom:8px">승인 대기 ('+pending.length+')</div>';
    for(const m of pending){
      html+=`<div class="admin-member" style="border-color:#fbbf24;background:#fffbeb">
        <span class="mascot-icon">${m.mascot||'⏳'}</span>
        <div class="member-info"><div class="member-name">${esc(m.name)}</div><div class="member-email">${esc(m.email)}</div></div>
        <button class="btn-remove" style="background:#ecfdf5;color:#059669" onclick="adminApproveMember('${m.email}')">승인</button>
        <button class="btn-remove" onclick="adminDeleteMember('${m.email}')">거부</button>
      </div>`;
    }
  }
  if(approved.length){
    html+='<div style="font-size:12px;font-weight:700;color:#64748b;margin:12px 0 8px">승인된 멤버 ('+approved.length+')</div>';
    for(const m of approved){
      const mascotOpts=MASCOTS.map(ms=>`<option value="${ms.emoji}"${ms.emoji===m.mascot?' selected':''}>${ms.emoji} ${ms.name}</option>`).join('');
      html+=`<div class="admin-member">
        <span class="mascot-icon">${m.mascot}</span>
        <div class="member-info"><div class="member-name">${esc(m.name)} <button style="background:none;border:none;cursor:pointer;font-size:11px;color:#94a3b8" onclick="adminRename('${m.email}','${esc(m.name)}')">✏️</button></div><div class="member-email">${esc(m.email)}</div></div>
        <select onchange="adminChangeMascot('${m.email}',this.value)">${mascotOpts}</select>

      </div>`;
    }
  }
  if(!members.length){
    html+='<div style="text-align:center;padding:20px;color:#94a3b8">멤버가 없습니다</div>';
  }
  html+='<div class="btns" style="margin-top:16px"><button class="btn-cancel" onclick="closeAdmin()">닫기</button></div>';
  panel.innerHTML=html;
  document.getElementById('admin-overlay').classList.add('open');
}
function closeAdmin(){document.getElementById('admin-overlay').classList.remove('open')}

async function adminApproveMember(email){
  const m=members.find(x=>x.email===email);
  if(!m)return;
  showLoading();
  try{
    await apiPost('member_save',{email,name:enc(m.name),mascot:m.mascot,color:m.color,status:'approved'});
    m.status='approved';
    renderMemberLegend();
    renderCalendars();
    openAdmin();
    hideLoading();
  }catch(e){alert('승인 실패: '+e.message);hideLoading()}
}

async function adminRename(email,oldName){
  const newName=prompt('이름 수정:',oldName);
  if(!newName||newName===oldName)return;
  const m=members.find(x=>x.email===email);
  if(!m)return;
  showLoading();
  try{
    await apiPost('member_save',{email,name:enc(newName),mascot:m.mascot,color:m.color,status:m.status||'approved'});
    m.name=newName;
    if(currentUser.email===email)currentUser.name=newName;
    renderMemberLegend();
    renderCalendars();
    openAdmin();
    hideLoading();
  }catch(e){alert('수정 실패: '+e.message);hideLoading()}
}

async function adminChangeMascot(email,newMascot){
  const m=members.find(x=>x.email===email);
  if(!m)return;
  const ms=getMascot(newMascot);
  showLoading();
  try{
    await apiPost('member_save',{email,name:enc(m.name),mascot:newMascot,color:ms.color});
    m.mascot=newMascot;
    m.color=ms.color;
    if(currentUser.email===email){currentUser.mascot=newMascot;currentUser.color=ms.color;}
    renderMemberLegend();
    renderCalendars();
    openAdmin();
    hideLoading();
  }catch(e){alert('변경 실패: '+e.message);hideLoading()}
}

async function adminDeleteMember(email){
  if(!confirm(`${email} 멤버를 삭제하시겠습니까?`))return;
  showLoading();
  try{
